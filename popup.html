<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Moderator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --border-color: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #ef4444;
      --success: #10b981;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      width: 280px;
      margin: 0;
      padding: 16px;
    }

    h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--success);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status-details {
      font-size: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-name {
      color: var(--text-muted);
    }

    .status-value {
      font-weight: 500;
    }

    .btn-options {
      display: block;
      width: 100%;
      text-align: center;
      background-color: #334155;
      color: var(--text-main);
      border: none;
      border-radius: 6px;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .btn-options:hover {
      background-color: #475569;
    }
  </style>
</head>
<body>
  <h3>🛡️ Content Moderator</h3>
  <div class="subtitle">Anti-Indian / Anti-Hindu Hate Filter</div>

  <div class="toggle-container">
    <span class="toggle-label">Active Monitoring</span>
    <label class="switch">
      <input type="checkbox" id="enabled-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status-details">
    <div class="status-row">
      <span class="status-name">Engine:</span>
      <span class="status-value" id="status-mode">Gemini 2.5 Flash</span>
    </div>
    <div class="status-row">
      <span class="status-name">Threshold:</span>
      <span class="status-value" id="status-threshold">0.70</span>
    </div>
  </div>

  <button class="btn-options" id="open-options">Configure Settings</button>

  <script src="popup.js"></script>
</body>
</html>
